<!DOCTYPE html>
<html>

<head>
    <title>Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="notes-body">

<svg class="forest-bg" viewBox="0 0 700 580" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g>
        <rect x="20" y="100" width="10" height="80" fill="#8B6043" rx="3"/>
        <ellipse cx="25" cy="80" rx="38" ry="45" fill="#6FA15A"/>
    </g>
    <g>
        <rect x="660" y="80" width="11" height="90" fill="#7A5538" rx="3"/>
        <ellipse cx="665" cy="60" rx="42" ry="48" fill="#679852"/>
    </g>
    <g opacity="0.85" fill="#A8C98F">
        <ellipse cx="0" cy="560" rx="80" ry="40"/>
        <ellipse cx="200" cy="570" rx="90" ry="35"/>
        <ellipse cx="500" cy="565" rx="90" ry="35"/>
        <ellipse cx="700" cy="555" rx="80" ry="40"/>
    </g>
</svg>

<div class="hero create-hero">

    <img
    src="{{ url_for('static', filename='images/fox-Guard.png') }}"
    class="fox-guard"
    alt="Guard Fox"/>

    <div>
        <h1>🔑 Change Password</h1>
        <p>Your fox stands watch while you update your key.</p>
    </div>

</div>

<br>

<div class="create-layout">

    <div class="create-card">

        <form method="POST">

            <label class="create-label">Current Password</label>
            <input
                type="password"
                name="current_password"
                placeholder="Current Password"
                required>

            <br><br>

            <label class="create-label">New Password</label>
            <input
                type="password"
                name="new_password"
                placeholder="New Password"
                required>

            <br><br>

            <label class="create-label">Confirm New Password</label>
            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm New Password"
                required>

            <br><br>

            <button type="submit">
                Change Password
            </button>

        </form>

        <br>

        <a href="/profile" class="profile-back-link">
            ← Back to Profile
        </a>

    </div>

    <div class="create-side">
        <img
        src="{{ url_for('static', filename='images/fox-Guard.png') }}"
        class="pinecone-buddy"
        alt="Guard Fox"/>
        <p class="create-tip">tip: pick a password your fox can't guess either 🛡️</p>
    </div>

</div>

<script>

function toggleDarkMode(){
    document.body.classList.toggle("dark");
    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
    } else {
        localStorage.setItem("theme","light");
    }
}

if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}

</script>

</body>

</html>
