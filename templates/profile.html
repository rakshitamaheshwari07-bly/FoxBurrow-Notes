<!DOCTYPE html>
<html>

<head>
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="notes-body">

<svg class="forest-bg" viewBox="0 0 700 580" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g>
        <rect x="20" y="100" width="10" height="80" fill="#8B6043" rx="3"/>
        <ellipse cx="25" cy="80" rx="38" ry="45" fill="#6FA15A"/>
    </g>
    <g>
        <rect x="660" y="80" width="11" height="90" fill="#7A5538" rx="3"/>
        <ellipse cx="665" cy="60" rx="42" ry="48" fill="#679852"/>
    </g>
    <g opacity="0.85" fill="#A8C98F">
        <ellipse cx="0" cy="560" rx="80" ry="40"/>
        <ellipse cx="200" cy="570" rx="90" ry="35"/>
        <ellipse cx="500" cy="565" rx="90" ry="35"/>
        <ellipse cx="700" cy="555" rx="80" ry="40"/>
    </g>
</svg>

<div class="hero create-hero">

    <img
    src="{{ url_for('static', filename='images/fox-Reading.png') }}"
    class="fox-reading"
    alt="Reading Fox"/>

    <div>
        <h1>👤 My Profile</h1>
        <p>Everything your fox knows about you.</p>
    </div>

</div>

<br>

<div class="create-layout">

    <div class="create-card">

        <div class="profile-row">
            <span class="profile-label">User ID</span>
            <span class="profile-value">{{ user[0] }}</span>
        </div>

        <div class="profile-row">
            <span class="profile-label">Username</span>
            <span class="profile-value">{{ user[1] }}</span>
        </div>

        <div class="profile-row">
            <span class="profile-label">Email</span>
            <span class="profile-value">{{ user[2] }}</span>
        </div>

        <div class="profile-row">
            <span class="profile-label">Total Notes</span>
            <span class="profile-value">{{ note_count }}</span>
        </div>

        <hr class="profile-divider">

        <div class="profile-links">
            <a href="/notes" class="home-btn">📝 My Notes</a>
            <a href="/change-password" class="home-btn">🔑 Change Password</a>
            <a href="/logout" class="home-btn home-btn-muted">🚪 Logout</a>
        </div>

    </div>

    <div class="create-side">
        <img
        src="{{ url_for('static', filename='images/Acorn.png') }}"
        class="pinecone-buddy"
        alt="Acorn buddy"/>
        <p class="create-tip">this little acorn keeps your stats safe 🌰</p>
    </div>

</div>

<script>

function toggleDarkMode(){
    document.body.classList.toggle("dark");
    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
    } else {
        localStorage.setItem("theme","light");
    }
}

if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}

</script>

</body>

</html>
