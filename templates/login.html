<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-body">

    <div class="auth-page">

        <svg class="forest-bg" viewBox="0 0 600 580" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

            <circle cx="500" cy="80" r="50" fill="#FBE6A8" opacity="0.6"/>

            <g>
                <rect x="35" y="180" width="14" height="120" fill="#8B6043" rx="4"/>
                <ellipse cx="42" cy="150" rx="55" ry="65" fill="#6FA15A"/>
                <ellipse cx="42" cy="110" rx="40" ry="48" fill="#7FAF66"/>
            </g>
            <g>
                <rect x="555" y="160" width="16" height="140" fill="#7A5538" rx="4"/>
                <ellipse cx="563" cy="125" rx="62" ry="72" fill="#679852"/>
                <ellipse cx="563" cy="80" rx="44" ry="52" fill="#78A862"/>
            </g>
            <g>
                <rect x="-10" y="380" width="12" height="100" fill="#8B6043" rx="4"/>
                <ellipse cx="-4" cy="355" rx="45" ry="55" fill="#7FAF66"/>
            </g>
            <g>
                <rect x="585" y="400" width="12" height="100" fill="#7A5538" rx="4"/>
                <ellipse cx="591" cy="375" rx="48" ry="58" fill="#6FA15A"/>
            </g>

            <g opacity="0.85" fill="#7FAF66">
                <ellipse cx="100" cy="290" rx="30" ry="20"/>
                <ellipse cx="140" cy="300" rx="24" ry="16"/>
                <ellipse cx="480" cy="280" rx="32" ry="20"/>
                <ellipse cx="440" cy="295" rx="22" ry="15"/>
            </g>

            <g>
                <rect x="118" y="305" width="6" height="16" fill="#E8E8E8"/>
                <ellipse cx="121" cy="300" rx="14" ry="9" fill="#D9764F"/>
                <ellipse cx="121" cy="300" rx="14" ry="5" fill="#E8895F"/>
            </g>
            <g>
                <rect x="468" y="315" width="5" height="14" fill="#E8E8E8"/>
                <ellipse cx="470" cy="311" rx="11" ry="7" fill="#D9764F"/>
                <ellipse cx="470" cy="311" rx="11" ry="4" fill="#E8895F"/>
            </g>

            <g opacity="0.9" fill="#A8C98F">
                <ellipse cx="-20" cy="540" rx="90" ry="50"/>
                <ellipse cx="120" cy="555" rx="100" ry="40"/>
                <ellipse cx="300" cy="545" rx="95" ry="48"/>
                <ellipse cx="480" cy="555" rx="100" ry="40"/>
                <ellipse cx="620" cy="540" rx="90" ry="50"/>
            </g>

            <g opacity="0.5" fill="#6FA15A">
                <ellipse cx="60" cy="500" rx="16" ry="8" transform="rotate(20 60 500)"/>
                <ellipse cx="200" cy="520" rx="14" ry="7" transform="rotate(-15 200 520)"/>
                <ellipse cx="400" cy="510" rx="16" ry="8" transform="rotate(15 400 510)"/>
                <ellipse cx="540" cy="500" rx="14" ry="7" transform="rotate(-20 540 500)"/>
            </g>

            <g opacity="0.4" fill="#7A8B69">
                <ellipse cx="90" cy="50" rx="13" ry="6.5" transform="rotate(30 90 50)"/>
                <ellipse cx="150" cy="30" rx="11" ry="5.5" transform="rotate(-20 150 30)"/>
                <ellipse cx="460" cy="40" rx="13" ry="6.5" transform="rotate(-30 460 40)"/>
            </g>
        </svg>

        <div class="auth-card">

            <img src="{{ url_for('static', filename='images/fox-sleeping.png') }}" alt="Sleepy Fox" class="fox-art">

            <h1 class="auth-title">Sleepy Fox</h1>
            <p class="auth-subtitle">your safe burrow for all your thoughts</p>

            <form method="POST" class="auth-form">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

                <br><br>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <br><br>

                <button type="submit">
                    Enter the burrow
                </button>

            </form>

            <p class="auth-footer">
                new here? <a href="/register">create an account</a>
            </p>

        </div>
    </div>

</body>

</html>
